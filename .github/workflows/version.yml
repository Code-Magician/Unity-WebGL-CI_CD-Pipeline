name: Semantic Version

on:
  push:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      #######################################################################
      # Checkout
      #######################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref }}

      #######################################################################
      # Read Commit Message
      #######################################################################

      - name: Read Commit Message
        shell: bash
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

          echo "Commit Message:"
          echo "$COMMIT_MESSAGE"

          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV

      #######################################################################
      # Ignore Auto Generated Commit
      #######################################################################

      - name: Ignore Version Commit
        shell: bash
        run: |

          if [[ "$COMMIT_MESSAGE" =~ ^chore\(webgl\): ]]; then
            echo "Version commit detected."

            echo "SKIP_VERSION=true" >> $GITHUB_ENV
          else
            echo "SKIP_VERSION=false" >> $GITHUB_ENV
          fi

      #######################################################################
      # Detect Increment Type
      #######################################################################

      - name: Detect Version Increment
        if: env.SKIP_VERSION == 'false'
        shell: bash
        run: |

          TYPE="none"

          if [[ "$COMMIT_MESSAGE" =~ ^${{ vars.MAJOR_PREFIX }}: ]]; then
            TYPE="major"

          elif [[ "$COMMIT_MESSAGE" =~ ^${{ vars.MINOR_PREFIX }}: ]]; then
            TYPE="minor"

          elif [[ "$COMMIT_MESSAGE" =~ ^${{ vars.PATCH_PREFIX }}: ]]; then
            TYPE="patch"

          fi

          echo "VERSION_TYPE=$TYPE" >> $GITHUB_ENV

          echo "Increment Type = $TYPE"

      #######################################################################
      # Stop if no version change
      #######################################################################

      - name: Exit
        if: env.VERSION_TYPE == 'none' || env.SKIP_VERSION == 'true'
        shell: bash
        run: |
          echo "Nothing to version."
          exit 0

      #######################################################################
      # Read Current Version
      #######################################################################

      - name: Read Version
        shell: bash
        run: |

          VERSION=$(cat "${{ vars.VERSION_FILE }}")

          echo "Current Version = $VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          echo "MAJOR=$MAJOR" >> $GITHUB_ENV
          echo "MINOR=$MINOR" >> $GITHUB_ENV
          echo "PATCH=$PATCH" >> $GITHUB_ENV

      #######################################################################
      # Calculate New Version
      #######################################################################

      - name: Calculate Version
        shell: bash
        run: |

          MAJOR=${MAJOR}
          MINOR=${MINOR}
          PATCH=${PATCH}

          case "$VERSION_TYPE" in

            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;

            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;

            patch)
              PATCH=$((PATCH + 1))
              ;;

          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          echo "New Version = $NEW_VERSION"

      #######################################################################
      # Update Version File
      #######################################################################

      - name: Update Version File
        shell: bash
        run: |

          echo "$NEW_VERSION" > "${{ vars.VERSION_FILE }}"

          echo ""

          cat "${{ vars.VERSION_FILE }}"

      #######################################################################
      # Commit Version
      #######################################################################

      - name: Commit Version
        shell: bash
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ vars.VERSION_FILE }}"

          git commit -m "chore(webgl): bump version to $NEW_VERSION"

          git push origin HEAD:${{ github.ref_name }}

      #######################################################################
      # Done
      #######################################################################

      - name: Finish
        run: |
          echo "Semantic Version Updated Successfully."