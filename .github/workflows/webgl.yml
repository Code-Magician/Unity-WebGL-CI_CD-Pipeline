# To skip this workflow, include either "[skip ci]" or "[ci skip]"
# anywhere in your commit message.
#
# Example:
# git commit -m "docs: update README [skip ci]"

name: Build & Deploy WebGL

on:
  workflow_run:
    workflows:
      - Semantic Version
    types:
      - completed
    branches:
      - develop

  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write
  statuses: write

#########################################################################
# Prevent multiple builds of the same branch.
#########################################################################

concurrency:
  group: webgl-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy

    #######################################################################
    # Job should run only when:
    # 1. Semantic Version completed successfully on develop AND original
    #    commit message starts with major:, minor:, or patch:
    # 2. OR anything is pushed/merged to main
    #######################################################################

    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'develop' &&
        (
          startsWith(github.event.workflow_run.head_commit.message, 'major:') ||
          startsWith(github.event.workflow_run.head_commit.message, 'minor:') ||
          startsWith(github.event.workflow_run.head_commit.message, 'patch:')
        ) &&
        !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
        !contains(github.event.workflow_run.head_commit.message, '[ci skip]')
      ) ||
      (
        github.event_name == 'push' &&
        github.ref_name == 'main' &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]')
      )

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

    #######################################################################
    # Resolve Branch Info
    #######################################################################

    - name: Resolve Build Context
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then

          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          SOURCE_COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          SOURCE_COMMIT_MESSAGE="${{ github.event.workflow_run.head_commit.message }}"

        else

          BRANCH_NAME="${{ github.ref_name }}"
          SOURCE_COMMIT_SHA="${{ github.sha }}"
          SOURCE_COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

        fi

        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "SOURCE_COMMIT_SHA=$SOURCE_COMMIT_SHA" >> $GITHUB_ENV

        {
          echo "SOURCE_COMMIT_MESSAGE<<EOF_SOURCE_COMMIT_MESSAGE"
          echo "$SOURCE_COMMIT_MESSAGE"
          echo "EOF_SOURCE_COMMIT_MESSAGE"
        } >> $GITHUB_ENV

        echo "Branch: $BRANCH_NAME"
        echo "Source Commit: $SOURCE_COMMIT_SHA"
        echo "Source Commit Message:"
        echo "$SOURCE_COMMIT_MESSAGE"

    #######################################################################
    # Checkout
    #
    # For develop workflow_run, checkout branch name, not workflow_run sha.
    # Reason: version.yml has just updated .version and pushed it to develop.
    # Checking out develop gives the latest .version file.
    #######################################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        lfs: true
        fetch-depth: 0

    - name: Pull Git LFS Files
      run: |
        git lfs install
        git lfs pull

    #######################################################################
    # Read Actual Checked Out Commit
    #######################################################################

    - name: Read Checked Out Commit
      shell: bash
      run: |
        CHECKED_OUT_COMMIT_SHA="$(git rev-parse HEAD)"
        CHECKED_OUT_COMMIT_MESSAGE="$(git log -1 --pretty=%B)"

        echo "CHECKED_OUT_COMMIT_SHA=$CHECKED_OUT_COMMIT_SHA" >> $GITHUB_ENV

        {
          echo "CHECKED_OUT_COMMIT_MESSAGE<<EOF_CHECKED_OUT_COMMIT_MESSAGE"
          echo "$CHECKED_OUT_COMMIT_MESSAGE"
          echo "EOF_CHECKED_OUT_COMMIT_MESSAGE"
        } >> $GITHUB_ENV

        echo "Checked Out Commit: $CHECKED_OUT_COMMIT_SHA"
        echo "Checked Out Commit Message:"
        echo "$CHECKED_OUT_COMMIT_MESSAGE"

    #######################################################################
    # Read Version
    #######################################################################

    - name: Read Version
      shell: bash
      run: |
        VERSION=$(cat "${{ vars.VERSION_FILE }}")

        echo "VERSION=$VERSION" >> $GITHUB_ENV

        echo "Current Version = $VERSION"

    #######################################################################
    # Create Build Version
    #######################################################################

    - name: Create Build Version
      shell: bash
      run: |
        if [[ "$BRANCH_NAME" == "develop" ]]; then

          BUILD_VERSION="${VERSION}-dev.${{ github.run_number }}"

        else

          BUILD_VERSION="${VERSION}"

        fi

        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

        echo "Build Version = $BUILD_VERSION"

    #######################################################################
    # Cache
    #######################################################################

    - name: Cache Unity Library
      uses: actions/cache@v4
      with:
        path: Library
        key: Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
        restore-keys: |
          Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-

    #######################################################################
    # Build Timer
    #######################################################################

    - name: Record Build Start
      run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

    #######################################################################
    # Generate Build Metadata
    #######################################################################

    - name: Generate Build Metadata
      shell: bash
      run: |
        mkdir -p Assets/StreamingAssets

        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > Assets/StreamingAssets/buildinfo.json <<EOF
        {
          "version": "$BUILD_VERSION",
          "buildNumber": "${{ github.run_number }}",
          "commit": "$CHECKED_OUT_COMMIT_SHA",
          "sourceCommit": "$SOURCE_COMMIT_SHA",
          "branch": "$BRANCH_NAME",
          "buildDate": "$BUILD_DATE",
          "unityVersion": "${{ vars.UNITY_VERSION }}",
          "workflow": "GitHub Actions",
          "buildConfiguration": "Release",
          "targetPlatform": "${{ vars.BUILD_TARGET }}",
          "buildMachine": "GitHub Runner"
        }
        EOF

        echo ""
        echo "========== BUILD INFO =========="
        cat Assets/StreamingAssets/buildinfo.json
        echo "================================"

    #######################################################################
    # Unity Build
    #######################################################################

    - name: Build Unity Project
      uses: game-ci/unity-builder@v4
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      with:
        targetPlatform: ${{ vars.BUILD_TARGET }}
        buildMethod: BuildScript.BuildWebGL

    #######################################################################
    # Upload Artifact Production Only
    #######################################################################

    - name: Upload WebGL Build
      if: env.BRANCH_NAME == 'main'
      uses: actions/upload-artifact@v4
      with:
        name: Portfolio-WebGL-${{ env.BUILD_VERSION }}
        path: ${{ vars.BUILD_OUTPUT }}
        retention-days: 2

    #######################################################################
    # Deploy Production
    #######################################################################

    - name: Deploy Production
      if: env.BRANCH_NAME == 'main'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🚀 Production Build ${{ env.BUILD_VERSION }}
          Branch: ${{ env.BRANCH_NAME }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    #######################################################################
    # Deploy Development
    #######################################################################

    - name: Deploy Development
      if: env.BRANCH_NAME == 'develop'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: develop
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🧪 Development Build ${{ env.BUILD_VERSION }}
          Branch: ${{ env.BRANCH_NAME }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

    #######################################################################
    # Build Summary
    #######################################################################

    - name: Print Build Summary
      run: |
        BUILD_END=$(date +%s)

        echo ""
        echo "=================================================="
        echo "Branch              : $BRANCH_NAME"
        echo "Version             : $BUILD_VERSION"
        echo "Run Number          : ${{ github.run_number }}"
        echo "Unity Version       : ${{ vars.UNITY_VERSION }}"
        echo "Build Target        : ${{ vars.BUILD_TARGET }}"
        echo "Source Commit       : $SOURCE_COMMIT_SHA"
        echo "Checked Out Commit  : $CHECKED_OUT_COMMIT_SHA"
        echo "Duration            : $((BUILD_END - BUILD_START)) seconds"
        echo "=================================================="