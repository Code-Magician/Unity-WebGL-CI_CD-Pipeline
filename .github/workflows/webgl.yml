name: Build & Deploy WebGL

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest

    env:
      VERSION: 1.0.${{ github.run_number }}
      BUILD_NUMBER: ${{ github.run_number }}
      COMMIT_SHA: ${{ github.sha }}
      BRANCH_NAME: ${{ github.ref_name }}
      BUILD_DATE: ${{ github.event.head_commit.timestamp }}
      WORKFLOW: GitHub Actions

    steps:

      #########################################################################
      # Checkout
      #########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull Git LFS Files
        run: |
          git lfs install
          git lfs pull

      #########################################################################
      # Cache
      #########################################################################

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-WebGL-${{ runner.os }}-

      - name: Cache Package Cache
        uses: actions/cache@v4
        with:
          path: Library/PackageCache
          key: PackageCache-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json') }}
          restore-keys: |
            PackageCache-${{ runner.os }}-

      - name: Cache Shader Cache
        uses: actions/cache@v4
        with:
          path: Library/ShaderCache
          key: ShaderCache-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            ShaderCache-${{ runner.os }}-

      #########################################################################
      # Build Timer
      #########################################################################

      - name: Record Build Start
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      #########################################################################
      # Debug (Temporary)
      #########################################################################

      - name: Print Build Variables
        run: |
          echo "VERSION=$VERSION"
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          echo "COMMIT_SHA=$COMMIT_SHA"
          echo "BRANCH_NAME=$BRANCH_NAME"
          echo "BUILD_DATE=$BUILD_DATE"
          echo "WORKFLOW=$WORKFLOW"

      - name: Verify DOTween
        run: |
          echo "===== DOTween ====="
          ls -lah Assets/Plugins/Demigiant/DOTween
          file Assets/Plugins/Demigiant/DOTween/DOTween.dll || true

      #########################################################################
      # Unity Build
      #########################################################################

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

          VERSION: ${{ env.VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          COMMIT_SHA: ${{ env.COMMIT_SHA }}
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
          WORKFLOW: ${{ env.WORKFLOW }}

        with:
          targetPlatform: WebGL
          buildMethod: BuildScript.BuildWebGL

      #########################################################################
      # Upload Artifact
      #########################################################################

      - name: Upload WebGL Build
        uses: actions/upload-artifact@v4
        with:
          name: Portfolio-WebGL
          path: Build/WebGL
          retention-days: 7

      #########################################################################
      # Deploy
      #########################################################################

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: Build/WebGL
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: |
            Build #${{ github.run_number }} - ${{ github.sha }}

        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      #########################################################################
      # Build Time
      #########################################################################

      - name: Print Build Time
        run: |
          BUILD_END=$(date +%s)
          echo ""
          echo "==============================="
          echo "Build completed in $((BUILD_END - BUILD_START)) seconds"
          echo "==============================="