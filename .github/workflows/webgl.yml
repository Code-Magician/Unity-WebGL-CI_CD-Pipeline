# To skip this workflow, include either "[skip ci]" or "[ci skip]"
# anywhere in your commit message.
#
# Example:
# git commit -m "docs: update README [skip ci]"
name: Build & Deploy WebGL

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".gitignore"

#########################################################################
# Prevent multiple builds of the same branch.
# If you push 5 commits quickly, only the latest build will continue.
#########################################################################

concurrency:
  group: webgl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest

    # Prevent infinite runner usage if Unity hangs
    timeout-minutes: 60

    steps:

      #######################################################################
      # Checkout
      #######################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull Git LFS Files
        run: |
          git lfs install
          git lfs pull

      #######################################################################
      # Read Current Version
      #######################################################################

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION=$(cat "${{ vars.VERSION_FILE }}")

          echo "Current Version: $VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      #######################################################################
      # Print Current Version
      #######################################################################

      - name: Print Version
        run: |
          echo "Repository Version = $VERSION"

      #######################################################################
      # Read Latest Commit Message
      #######################################################################

      - name: Read Commit Message
        shell: bash
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

          echo "Commit Message:"
          echo "$COMMIT_MESSAGE"

          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
      
      #######################################################################
      # Detect Version Increment
      #######################################################################

      - name: Detect Version Increment
        shell: bash
        run: |
          TYPE="none"

          if [[ "$COMMIT_MESSAGE" =~ ^${{ vars.MAJOR_PREFIX }}: ]]; then
            TYPE="major"
          elif [[ "$COMMIT_MESSAGE" =~ ^${{ vars.MINOR_PREFIX }}: ]]; then
            TYPE="minor"
          elif [[ "$COMMIT_MESSAGE" =~ ^${{ vars.PATCH_PREFIX }}: ]]; then
            TYPE="patch"
          fi

          echo "Version Increment: $TYPE"

          echo "VERSION_TYPE=$TYPE" >> $GITHUB_ENV

      #######################################################################
      # Cache
      #######################################################################

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-

      #######################################################################
      # Build Timer
      #######################################################################

      - name: Record Build Start
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      #######################################################################
      # Generate Build Metadata
      #######################################################################

      - name: Generate Build Metadata
        shell: bash
        run: |
          mkdir -p Assets/StreamingAssets

          cat > Assets/StreamingAssets/buildinfo.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "buildDate": "${{ github.event.head_commit.timestamp }}",
            "unityVersion": "${{ vars.UNITY_VERSION }}",
            "workflow": "GitHub Actions",
            "buildConfiguration": "Release",
            "targetPlatform": "${{ vars.BUILD_TARGET }}",
            "buildMachine": "GitHub Runner"
          }
          EOF

          echo "========== BUILD INFO =========="
          cat Assets/StreamingAssets/buildinfo.json

      #######################################################################
      # Unity Build
      #######################################################################

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: ${{ vars.BUILD_TARGET }}
          buildMethod: BuildScript.BuildWebGL

      #######################################################################
      # Upload Artifact (Production Only)
      #######################################################################

      - name: Upload WebGL Build
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Portfolio-WebGL-${{ github.run_number }}
          path: ${{ vars.BUILD_OUTPUT }}
          retention-days: 2

      #######################################################################
      # Deploy Production
      #######################################################################

      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ${{ vars.BUILD_OUTPUT }}
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: |
            🚀 Production Build #${{ github.run_number }}
            Branch: ${{ github.ref_name }}

        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      #######################################################################
      # Deploy Development
      #######################################################################

      - name: Deploy Development
        if: github.ref == 'refs/heads/develop'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ${{ vars.BUILD_OUTPUT }}
          production-branch: develop
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: |
            🧪 Development Build #${{ github.run_number }}
            Branch: ${{ github.ref_name }}

        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

      #######################################################################
      # Build Time
      #######################################################################

      - name: Print Build Time
        run: |
          BUILD_END=$(date +%s)

          echo ""
          echo "============================================"
          echo "Branch        : ${{ github.ref_name }}"
          echo "Run Number    : ${{ github.run_number }}"
          echo "Build Target  : ${{ vars.BUILD_TARGET }}"
          echo "Unity Version : ${{ vars.UNITY_VERSION }}"
          echo "Duration      : $((BUILD_END - BUILD_START)) seconds"
          echo "============================================"