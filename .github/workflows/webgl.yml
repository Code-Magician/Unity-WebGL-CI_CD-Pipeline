# To skip this workflow, include either "[skip ci]" or "[ci skip]"
# anywhere in your commit message.
#
# Example:
# git commit -m "docs: update README [skip ci]"

name: Build & Deploy WebGL

on:
  push:
    branches:
      - develop
      - main

    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".gitignore"

permissions:
  contents: read

#########################################################################
# Prevent multiple builds of the same branch.
#########################################################################

concurrency:
  group: webgl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

    #######################################################################
    # Checkout
    #######################################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 0

    - name: Pull Git LFS Files
      run: |
        git lfs install
        git lfs pull

    #######################################################################
    # Read Commit Message
    #######################################################################

    - name: Read Commit Message
      shell: bash
      run: |

        COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

        echo "$COMMIT_MESSAGE"

        echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV

    #######################################################################
    # Should Build?
    #######################################################################

    - name: Detect Build Commit
      shell: bash
      run: |

        BUILD=false

        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then

            # Always build on production
            BUILD=true

        elif [[ "$COMMIT_MESSAGE" =~ ^chore\(webgl\): ]]; then

            # Only build version bump commits on develop
            BUILD=true

        fi

        echo "BUILD=$BUILD" >> $GITHUB_ENV
        echo "BUILD = $BUILD"

    #######################################################################
    # Stop if not a build commit
    #######################################################################

    - name: Exit
      if: env.BUILD != 'true'
      run: |
        echo "Skipping Unity Build."
        exit 0

    #######################################################################
    # Read Version
    #######################################################################

    - name: Read Version
      shell: bash
      run: |

        VERSION=$(cat "${{ vars.VERSION_FILE }}")

        echo "VERSION=$VERSION" >> $GITHUB_ENV

        echo "Current Version = $VERSION"

    #######################################################################
    # Create Build Version
    #######################################################################

    - name: Create Build Version
      shell: bash
      run: |

        if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then

          BUILD_VERSION="${VERSION}-dev.${{ github.run_number }}"

        else

          BUILD_VERSION="${VERSION}"

        fi

        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

        echo "Build Version = $BUILD_VERSION"

    #######################################################################
    # Cache
    #######################################################################

    - name: Cache Unity Library
      uses: actions/cache@v4
      with:
        path: Library
        key: Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
        restore-keys: |
          Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-

    #######################################################################
    # Build Timer
    #######################################################################

    - name: Record Build Start
      run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

    #######################################################################
    # Generate Build Metadata
    #######################################################################

    - name: Generate Build Metadata
      shell: bash
      run: |

        mkdir -p Assets/StreamingAssets

        cat > Assets/StreamingAssets/buildinfo.json <<EOF
        {
          "version": "$BUILD_VERSION",
          "buildNumber": "${{ github.run_number }}",
          "commit": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "buildDate": "${{ github.event.head_commit.timestamp }}",
          "unityVersion": "${{ vars.UNITY_VERSION }}",
          "workflow": "GitHub Actions",
          "buildConfiguration": "Release",
          "targetPlatform": "${{ vars.BUILD_TARGET }}",
          "buildMachine": "GitHub Runner"
        }
        EOF

        echo ""
        echo "========== BUILD INFO =========="
        cat Assets/StreamingAssets/buildinfo.json
        echo "================================"

    #######################################################################
    # Unity Build
    #######################################################################

    - name: Build Unity Project
      uses: game-ci/unity-builder@v4
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      with:
        targetPlatform: ${{ vars.BUILD_TARGET }}
        buildMethod: BuildScript.BuildWebGL

    #######################################################################
    # Upload Artifact (Production Only)
    #######################################################################

    - name: Upload WebGL Build
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: Portfolio-WebGL-${{ env.BUILD_VERSION }}
        path: ${{ vars.BUILD_OUTPUT }}
        retention-days: 2

    #######################################################################
    # Deploy Production
    #######################################################################

    - name: Deploy Production
      if: github.ref == 'refs/heads/main'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🚀 Production Build ${{ env.BUILD_VERSION }}
          Branch: ${{ github.ref_name }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    #######################################################################
    # Deploy Development
    #######################################################################

    - name: Deploy Development
      if: github.ref == 'refs/heads/develop'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: develop
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🧪 Development Build ${{ env.BUILD_VERSION }}
          Branch: ${{ github.ref_name }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

    #######################################################################
    # Build Summary
    #######################################################################

    - name: Print Build Summary
      run: |

        BUILD_END=$(date +%s)

        echo ""
        echo "=================================================="
        echo "Branch          : ${{ github.ref_name }}"
        echo "Version         : $BUILD_VERSION"
        echo "Run Number      : ${{ github.run_number }}"
        echo "Unity Version   : ${{ vars.UNITY_VERSION }}"
        echo "Build Target    : ${{ vars.BUILD_TARGET }}"
        echo "Duration        : $((BUILD_END - BUILD_START)) seconds"
        echo "=================================================="