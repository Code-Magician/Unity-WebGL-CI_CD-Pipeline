name: Continuous Integration

on:
  pull_request:
    branches:
      - develop
      - main

  push:
    branches:
      - "feature/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Unity Project
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull Git LFS Files
        run: |
          git lfs install
          git lfs pull

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json','ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: ${{ vars.BUILD_TARGET }}
          buildMethod: BuildScript.BuildWebGL

      - name: Upload Validation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Validation-Build-${{ github.run_number }}
          path: ${{ vars.BUILD_OUTPUT }}
          retention-days: 1